<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Mini keyboard macro pad and HUD preview</title>
  <desc id="desc">A 4 by 3 macro pad next to the live HUD panel showing apps, nav, and num modes.</desc>
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d333f"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
    <linearGradient id="hud" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e9eef5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#111827" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1120" height="760" rx="34" fill="#f4f1eb"/>
  <path d="M0 620H1120V760H0Z" fill="#dde9e3"/>
  <path d="M96 124H632C671 124 702 155 702 194V600C702 639 671 670 632 670H96C57 670 26 639 26 600V194C26 155 57 124 96 124Z" fill="url(#case)" filter="url(#shadow)"/>
  <path d="M96 146H632C659 146 680 167 680 194V600C680 627 659 648 632 648H96C69 648 48 627 48 600V194C48 167 69 146 96 146Z" fill="#222832"/>
