# ───────────────────────────────────────────────────────────────────────────
#  Mini macro pad (USB 4132:2107) — 3 manual modes via keyd
# ───────────────────────────────────────────────────────────────────────────
#
#  Only this pad's KEYBOARD interfaces are grabbed (the "k:" prefix below).
#  Its mouse interface and every other keyboard (incl. the Keychron K2,
#  05ac:024f) are left completely untouched.
#
#  Physical 4x3 layout — factory keycodes the pad sends:
#
#      [ 1 ][ 2 ][ 3 ]
#      [ 4 ][ 5 ][ 6 ]
#      [ 7 ][ 8 ][ 9 ]
#      [ 0 ][ a ][ b ]
#
#  Switch modes — press both keys of a row's OUTER PAIR together (within 50ms):
#      1 + 3  ->  apps   (this base layer)
#      4 + 6  ->  nav
#      7 + 9  ->  num
#
#  apps is the always-on base layer ([main]); nav and num toggle over it,
#  swap() moves between them, clear() drops back to apps.
#
#  IMPORTANT: keyd does NOT support inline comments on binding lines.
#  Keep comments on their own line. A trailing "# ..." after a macro silently
#  breaks that binding (the key falls through to its factory code).
#
#  PANIC (if keys ever wedge): hold  backspace + esc + enter  to kill keyd.
#  Edit: change a right-hand side, then  sudo keyd.rvaiya reload
#  (structural changes -> sudo systemctl restart keyd).  See man keyd.rvaiya.
# ───────────────────────────────────────────────────────────────────────────

[ids]
k:4132:2107

[global]
chord_timeout = 50

# ───────────────────────── apps — app shortcuts (base layer) ────────────────
# 1 copy   2 paste  3 cut
# 4 undo   5 redo   6 save
# 7 all    8 find   9 close
# 0 switchwin   a newtab   b reopentab
[main]

1 = C-c
2 = C-v
3 = C-x
4 = C-z
5 = C-S-z
6 = C-s
7 = C-a
8 = C-f
9 = C-w
0 = A-tab
a = C-t
b = C-S-t

1+3 = clear()
4+6 = toggle(nav)
7+9 = toggle(num)

# ───────────────────────────── nav — arrows / navigation ────────────────────
# 1 home   2 up     3 pageup
# 4 left   5 enter  6 right
# 7 end    8 down   9 pagedown
# 0 esc    a tab    b backspace
[nav]

1 = home
2 = up
3 = pageup
4 = left
5 = enter
6 = right
7 = end
8 = down
9 = pagedown
0 = esc
a = tab
b = backspace

1+3 = clear()
4+6 = swap(nav)
7+9 = swap(num)

# ───────────────────────────── num — numbers (calculator layout) ────────────
# Uses digit-row keycodes, NOT keypad (kp*) codes: kp* keys act as
# Home/Up/PageUp/etc. when NumLock is off, so they would not type numbers.
# 1 7   2 8   3 9
# 4 4   5 5   6 6
# 7 1   8 2   9 3
# 0 0   a .   b enter
[num]

1 = 7
2 = 8
3 = 9
4 = 4
5 = 5
6 = 6
7 = 1
8 = 2
9 = 3
0 = 0
a = .
b = enter

1+3 = clear()
4+6 = swap(nav)
7+9 = swap(num)
